  <rect x="500" y="460" width="200" height="40" rx="20" fill="#10b981" opacity="0.15"/>
  <text x="600" y="487" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#10b981" text-anchor="middle">No Data Stored</text>
  
  <rect x="720" y="460" width="160" height="40" rx="20" fill="#10b981" opacity="0.15"/>
  <text x="800" y="487" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#10b981" text-anchor="middle">Free Forever</text>
  
