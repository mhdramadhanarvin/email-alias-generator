      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#141414"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Accent border -->
  <rect x="40" y="40" width="1120" height="550" rx="20" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.3"/>
  
  <!-- Email icon -->
  <rect x="540" y="120" width="120" height="80" rx="8" fill="#10b981" opacity="0.2"/>
  <path d="M540 140 L600 180 L660 140" stroke="#10b981" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="540" y="145" width="120" height="55" rx="0 0 8 8" fill="none" stroke="#10b981" stroke-width="4"/>
  
  <!-- Title -->
  <text x="600" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="#ffffff" text-anchor="middle">Email Alias Generator</text>
  
  <!-- Subtitle -->
  <text x="600" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#737373" text-anchor="middle">Generate unlimited Email aliases instantly</text>
  
  <!-- Feature pills -->
